# Render Blueprint — Web Service: apps/api (pnpm monorepo)
# 대시보드에서 이름이 yeoun-api 로 맞으면 연동되거나, 새로 만들 때 참고.
# DATABASE_URL 등 시크릿은 Render UI → Environment 에서만 설정.

services:
  - type: web
    name: yeoun-api
    runtime: node
    plan: free
    # 빌드/시작은 scripts/ 로 두고, Render 대시보드에서는 Build/Start 를 비워 Blueprint 를 쓰거나
    # 반드시 아래 한 줄만 넣음 (직접 이어 붙이다 buildpnpm 같은 오타로 API 빌드가 스킵됨).
    buildCommand: bash scripts/render-api-build.sh
    startCommand: bash scripts/render-api-start.sh
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ENABLE_EXPERIMENTAL_COREPACK
        value: "1"
